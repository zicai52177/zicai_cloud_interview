version: '3.8'

services:
  # =============== Infrastructure ===============
  mysql:
    image: mysql:8.0
    container_name: ci-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ci-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ci-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: ci-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: security
      NACOS_AUTH_TOKEN: SecretKey012345678901234567890123456789012345678901234567890123456789
    ports:
      - "8848:8848"
      - "9848:9848"
    depends_on:
      mysql:
        condition: service_healthy

  # =============== Backend Services ===============
  gateway:
    build:
      context: .
      args:
        SERVICE_NAME: gateway
        SERVICE_PORT: 8080
    container_name: ci-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - deploy/.env.production
    depends_on:
      - nacos
      - redis

  account-service:
    build:
      context: .
      args:
        SERVICE_NAME: account-service
        SERVICE_PORT: 9001
    container_name: ci-account
    restart: unless-stopped
    env_file:
      - deploy/.env.production
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - nacos

  ai-service:
    build:
      context: .
      args:
        SERVICE_NAME: ai-service
        SERVICE_PORT: 9002
    container_name: ci-ai
    restart: unless-stopped
    env_file:
      - deploy/.env.production
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - nacos

  product-service:
    build:
      context: .
      args:
        SERVICE_NAME: product-service
        SERVICE_PORT: 9003
    container_name: ci-product
    restart: unless-stopped
    env_file:
      - deploy/.env.production
    volumes:
      - ./deploy/cert:/opt/app/cert:ro
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - nacos

  # =============== Frontend ===============
  frontend:
    build:
      context: ./frontend
    container_name: ci-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - gateway

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
