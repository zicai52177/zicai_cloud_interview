# Gateway 开发环境配置
spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER}
        username: ${NACOS_USER}
        password: ${NACOS_PASSWORD}

    gateway:
      server:
        webflux:
          # 全局 CORS 配置
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins:
                  - "http://localhost:5173"
                  - "http://localhost:3000"
                  - "http://127.0.0.1:5173"
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowed-headers: "*"
                allow-credentials: true
                max-age: 3600

          # 路由配置
          routes:
            # ========== Account Service (9001) ==========
            - id: account-service
              uri: lb://account-service
              predicates:
                - Path=/api/v1/account/**,/api/v1/wechat/**
              filters:
                - StripPrefix=0

            # ========== AI Service (9002) ==========
            - id: ai-service
              uri: lb://ai-service
              predicates:
                - Path=/api/v1/ai/**,/api/v1/resume/**,/api/v1/interview/**
              filters:
                - StripPrefix=0

            # ========== Product Service (9003) ==========
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/v1/product/**,/api/v1/order/**,/api/v1/banner/**,/api/v1/pay/**
              filters:
                - StripPrefix=0

          # 默认过滤器
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

  # Redis (用于限流，可选)
  data:
    redis:
      host: ${REDIS_SERVER}
      port: 6379
      password: ${REDIS_PASSWORD}

# Actuator 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      access: unrestricted

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
